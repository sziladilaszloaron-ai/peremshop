<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lacika Brand</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
            text-align: center;
            margin: 0;
        }

        header {
            padding: 50px;
        }

        .product {
            background: #222;
            width: 300px;
            margin: 20px auto;
            padding: 20px;
            border-radius: 15px;
        }

        img {
            width: 100%;
            border-radius: 10px;
        }

        button {
            background: #00ff88;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

<header>
    <h1>LACIKA BRAND</h1>
    <p>Saját ruhamárka</p>
</header>

<div class="product">
    <img src="https://via.placeholder.com/300x300" alt="Póló">
    <h2>Prémium Póló</h2>
    <p>Ár: 6990 Ft</p>

    <a href="https://paypal.me/IDEJONAMA_LINK">
        <button>Vásárlás</button>
    </a>
</div>

</body>
</html>
